# ═══════════════════════════════════════════════════
# Kitty Terminal Configuration
# ═══════════════════════════════════════════════════
# Migrated from tmux + Ghostty workflow.
# Kitty replaces tmux as the multiplexer (tabs = windows, wins = panes).
# Pi inline images work natively — no passthrough hacks needed.
#
# Stow:  cd ~/dotfiles && stow kitty
# Reload:  r  (Alt+r mapped below)
# ═══════════════════════════════════════════════════

# ───────────────────────────────────────────────────
# Theme: Tokyo Night (Storm)
# ───────────────────────────────────────────────────
foreground              #c0caf5
background              #1a1b26
selection_foreground    #c0caf5
selection_background    #292e42
cursor                  #c0caf5
cursor_text_color       #1a1b26
url_color               #7aa2f7

# ANSI Colors
color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# Tab bar
active_tab_foreground   #7aa2f7
active_tab_background   #292e42
inactive_tab_foreground #565f89
inactive_tab_background #1a1b26
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        1

# ───────────────────────────────────────────────────
# Font
# ───────────────────────────────────────────────────
font_family      JetBrains Mono
font_size        14.0
disable_ligatures never

# ───────────────────────────────────────────────────
# Window & Padding
# ───────────────────────────────────────────────────
remember_window_size     yes
initial_window_width     100c
initial_window_height     40c
hide_window_decorations  true
window_padding_width     4 2 4 2
resize_in_steps          no

# Full perimeters around every pane so the active window gets a complete
# colored rectangle — clear focus indication, just like tmux.
draw_minimal_borders     no
active_border_color      #565f89
inactive_border_color    #292e42
window_border_width      1.0pt

# Also dim inactive panes so focus is unmistakable (value 0-1, 1 = no dimming).
# 0.75 fades inactive text just enough without hurting readability.
inactive_text_alpha      0.75

# ───────────────────────────────────────────────────
# Cursor
# ───────────────────────────────────────────────────
cursor_shape             block
cursor_blink_interval     0.5
cursor_stop_blinking_after 15.0

# ───────────────────────────────────────────────────
# Scrollback
# ───────────────────────────────────────────────────
scrollback_lines         10000
scrollback_pager         less --chop-long-lines --RAW-CONTROL-CHARS

# ───────────────────────────────────────────────────
# Mouse
# ───────────────────────────────────────────────────
# tmux had mouse off; kitty defaults are fine.
# Keyboard-driven workflow below.
copy_on_select           no

# ───────────────────────────────────────────────────
# Clipboard (Wayland)
# ───────────────────────────────────────────────────
clipboard_control        write-clipboard write-primary

# ───────────────────────────────────────────────────
# Remote Control (for scripting)
# ───────────────────────────────────────────────────
allow_remote_control     yes
listen_on                unix:/tmp/kitty-${USER}

# ───────────────────────────────────────────────────
# Shell Integration
# ───────────────────────────────────────────────────
shell_integration        enabled no-cursor

# ───────────────────────────────────────────────────
# Bell
# ───────────────────────────────────────────────────
enable_audio_bell        no
visual_bell_duration     0.0

# ═══════════════════════════════════════════════════
# Keybindings (Alt-based, migrated from tmux)
# ═══════════════════════════════════════════════════
# Note: kitty maps are global — no prefix key needed.
#       `kitty_mod` defaults to Ctrl+Shift; we leave it.
#       All tmux Alt maps become kitty Alt maps directly.
# ═══════════════════════════════════════════════════

# ── Splits (was tmux pane splits) ──────────────────
map alt+v        launch --location=vsplit --cwd=current
map alt+s        launch --location=hsplit --cwd=current

# ── New tab (was tmux new-window) ──────────────────
map alt+n        new_tab_with_cwd

# ── Pane/Window navigation ───────────────────────
map alt+h        neighboring_window left
map alt+j        neighboring_window down
map alt+k        neighboring_window up
map alt+l        neighboring_window right

# ── Tab switching (was tmux select-window) ─────────
map alt+1        goto_tab 1
map alt+2        goto_tab 2
map alt+3        goto_tab 3
map alt+4        goto_tab 4
map alt+5        goto_tab 5
map alt+6        goto_tab 6
map alt+7        goto_tab 7
map alt+8        goto_tab 8
map alt+9        goto_tab 9

# ── Tab reorder (was tmux swap-window) ─────────────
# Kitty has no native swap-tab; use move_window for panes instead.
# Skip M-< / M-> — drag tab if needed (or use remote-control script).

# ── Pane swap (was tmux swap-pane) ─────────────────
# No direct kitty equivalent for swap-pane.
# map alt+shift+braceleft  xxx
# map alt+shift+braceright xxx

# ── Layout cycling ─────────────────────────────────
map alt+space        next_layout

# ── Zoom / Stack toggle ────────────────────────────
map alt+z        toggle_layout stack

# ── Pane resizing ──────────────────────────────────
map alt+shift+h  resize_window narrower 5
map alt+shift+j  resize_window taller   5
map alt+shift+k  resize_window shorter  5
map alt+shift+l  resize_window wider    5

# ── Close window/tab ───────────────────────────────
map alt+shift+q  close_window
map alt+shift+w  close_tab

# ── Reload config ──────────────────────────────────
map alt+r        load_config_file
map alt+shift+r  debug_config

# ── Scrollback / Copy ──────────────────────────────
# `Alt+[` enters kitty_grab: lightweight vi-like keyboard selection.
# hjkl move, v/V block select, y yank&quit, q quit, / search.
# Ctrl+Shift+h still opens the full scrollback in less.
map alt+[        kitten kitty_grab/grab.py

# Word motion in grab mode needs these freed from kitty default:
map ctrl+shift+left  no_op
map ctrl+shift+right no_op

# Hints kitten for quick keyboard selection of URLs/paths/words:
map alt+shift+f  kitten hints

# ── Misc tmux-equivalents ──────────────────────────
# tmux `prefix [` → kitty `alt+[` (kitty_grab vi selection)
# tmux `prefix r` → kitty `alt+r` (see above)
# tmux `prefix d` → just close the OS window

# ═══════════════════════════════════════════════════
# Layouts
# ═══════════════════════════════════════════════════
enabled_layouts splits,stack,tall,fat,grid,horizontal,vertical
